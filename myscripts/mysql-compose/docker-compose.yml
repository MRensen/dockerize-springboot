
services:
  app:
    image: 'image'
    ports: 
        - "8080:8080"
    container_name: app
    depends_on:
      db:
        condition: service_healthy
    environment:
      - SERVER.PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/testing
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=password
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create-drop
    volumes:
      - /tmp/uploads:/uploads
      - ./src:/src

  kc:
    image: quay.io/keycloak/keycloak:26.5.3
    container_name: kc
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HOSTNAME: kc
      KC_HOSTNAME_PORT: 9090
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: true
    command: [ "start-dev", "--http-port", "9090", "--https-port", "9443", "--import-realm" ]
    volumes:
      - ./kc:/opt/keycloak/data/import
    ports:
      - "9090:9090"
      - "9443:9443"
      - "9000:9000"

  db:
      image: mysql
      restart: always
      container_name: db
      ports:
        - "3307:3306"
      expose:
        - "3306"
      environment:
        MYSQL_ROOT_PASSWORD: password
        MYSQL_DATABASE: testing
      healthcheck:
          test: ["CMD-SHELL", "mysqladmin ping -u root --password=password"]
          interval: 10s
          timeout: 5s
          retries: 5
